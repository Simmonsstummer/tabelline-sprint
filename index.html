<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tabelline">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ff3d8a">
<meta name="description" content="Impara le tabelline divertendoti! Quante ne indovini in 60 secondi?">
<title>Tabelline Sprint</title>

<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #ff3d8a;
  --yellow: #ffc845;
  --blue: #3aa3ff;
  --purple: #8b5cf6;
  --green: #34d399;
  --red: #ef4444;
  --orange: #ff8c42;
  --dark: #1a1a2e;
  --light: #fff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

html, body {
  overflow: hidden;
  overscroll-behavior: none;
  position: fixed;
  width: 100%;
  height: 100%;
}

body {
  font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
  background: linear-gradient(135deg, #ff3d8a 0%, #8b5cf6 50%, #3aa3ff 100%);
  background-size: 300% 300%;
  animation: bgShift 18s ease infinite;
  color: var(--dark);
  position: relative;
}

@keyframes bgShift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.bg-shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.4;
  pointer-events: none;
  z-index: 0;
}
.bg-shape:nth-child(1) {
  width: 200px; height: 200px;
  background: var(--yellow);
  top: -50px; left: -50px;
  animation: float1 12s ease-in-out infinite;
}
.bg-shape:nth-child(2) {
  width: 250px; height: 250px;
  background: var(--green);
  bottom: -80px; right: -60px;
  animation: float2 14s ease-in-out infinite;
}

@keyframes float1 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(40px, 60px) scale(1.2); }
}
@keyframes float2 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-50px, -40px) scale(1.15); }
}

.container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  height: 100%;
  padding: 20px 18px;
  padding-top: max(20px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 1;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  text-align: center;
  width: 100%;
  gap: 18px;
}

.screen.active {
  display: flex;
  animation: screenIn 0.45s cubic-bezier(.34,1.56,.64,1);
}

@keyframes screenIn {
  from { opacity: 0; transform: translateY(15px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ========== START SCREEN ========== */
.title {
  font-size: clamp(2.4rem, 10vw, 3.6rem);
  font-weight: 700;
  color: white;
  text-shadow: 4px 4px 0 var(--dark), 8px 8px 0 rgba(0,0,0,0.15);
  letter-spacing: 2px;
  line-height: 0.95;
  transform: rotate(-3deg);
  animation: titleBob 2.5s ease infinite;
}
.title .row2 {
  display: inline-block;
  transform: rotate(2deg) translateX(15px);
  color: var(--yellow);
}

@keyframes titleBob {
  0%, 100% { transform: rotate(-3deg) translateY(0); }
  50% { transform: rotate(-3deg) translateY(-8px); }
}

.record-card {
  background: white;
  border-radius: 22px;
  padding: 16px 36px;
  border: 4px solid var(--dark);
  box-shadow: 0 7px 0 var(--dark), 0 12px 28px rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  gap: 16px;
}

.record-icon {
  font-size: 2.4rem;
  animation: trophy 2s ease infinite;
}

@keyframes trophy {
  0%, 100% { transform: rotate(-8deg); }
  50% { transform: rotate(8deg); }
}

.record-text { text-align: left; }
.record-label {
  font-size: 0.78rem;
  font-weight: 500;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.record-value {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--pink);
  line-height: 1;
  margin-top: 2px;
}

.record-context {
  font-size: 0.72rem;
  font-weight: 500;
  color: #888;
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.tables-selector {
  background: white;
  border-radius: 20px;
  padding: 14px 16px 16px;
  border: 4px solid var(--dark);
  box-shadow: 0 6px 0 var(--dark);
  width: 100%;
}

.tables-label {
  font-size: 0.85rem;
  font-weight: 600;
  color: #666;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tables-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 7px;
}

.table-toggle {
  background: #f1f2f6;
  border: 3px solid var(--dark);
  border-radius: 12px;
  padding: 9px 0;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
  color: #888;
  box-shadow: 0 3px 0 var(--dark);
}

.table-toggle.active {
  background: var(--yellow);
  color: var(--dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 0 var(--dark);
}

.table-toggle:active {
  transform: translateY(3px);
  box-shadow: none;
}

.start-btn {
  background: var(--yellow);
  color: var(--dark);
  border: 5px solid var(--dark);
  border-radius: 30px;
  padding: 18px 50px;
  font-family: inherit;
  font-size: 1.7rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 0 var(--dark), 0 14px 30px rgba(0,0,0,0.35);
  transition: all 0.12s ease;
  letter-spacing: 3px;
  animation: pulseBtn 1.6s ease infinite;
  margin-top: 4px;
}

@keyframes pulseBtn {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

.start-btn:active {
  transform: translateY(6px) scale(1);
  box-shadow: 0 2px 0 var(--dark);
  animation: none;
}

/* ========== GAME SCREEN ========== */
.game-header {
  width: 100%;
  display: flex;
  gap: 8px;
}

.stat-box {
  background: white;
  border-radius: 14px;
  padding: 8px 6px;
  border: 3px solid var(--dark);
  box-shadow: 0 4px 0 var(--dark);
  flex: 1;
  text-align: center;
}

.stat-label {
  font-size: 0.65rem;
  font-weight: 500;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-value {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--dark);
  line-height: 1.1;
  transition: transform 0.2s ease;
}

.stat-value.bump {
  animation: bump 0.35s ease;
}

@keyframes bump {
  0% { transform: scale(1); }
  50% { transform: scale(1.35); color: var(--green); }
  100% { transform: scale(1); }
}

.timer-value.warning {
  color: var(--red);
  animation: pulseWarn 0.5s ease infinite;
}

@keyframes pulseWarn {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.timer-bar-container {
  width: 100%;
  height: 14px;
  background: rgba(255,255,255,0.45);
  border-radius: 10px;
  border: 3px solid var(--dark);
  overflow: hidden;
  box-shadow: 0 3px 0 var(--dark);
}

.timer-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--green) 0%, var(--yellow) 60%, var(--red) 100%);
  width: 100%;
  transition: width 0.15s linear;
}

.question-card {
  background: white;
  border-radius: 26px;
  padding: 32px 24px;
  border: 5px solid var(--dark);
  box-shadow: 0 8px 0 var(--dark), 0 14px 30px rgba(0,0,0,0.25);
  width: 100%;
}

.question-card.fly-in {
  animation: flyIn 0.35s cubic-bezier(.34,1.56,.64,1);
}

@keyframes flyIn {
  0% { transform: scale(0.7) rotate(-4deg); opacity: 0; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.question {
  font-size: clamp(2.8rem, 11vw, 4rem);
  font-weight: 700;
  color: var(--dark);
  letter-spacing: 2px;
}

.question .op {
  color: var(--pink);
  font-weight: 600;
  margin: 0 8px;
}

.question .q-mark {
  color: var(--blue);
  margin-left: 8px;
}

.answers {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.answer-btn {
  border: 4px solid var(--dark);
  border-radius: 18px;
  padding: 18px;
  font-family: inherit;
  font-size: 1.8rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 0 var(--dark);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  color: var(--dark);
  position: relative;
}

.answer-btn:nth-child(1) { background: #ffd6e7; }
.answer-btn:nth-child(2) { background: #cee9ff; }
.answer-btn:nth-child(3) { background: #fff0c2; }

.answer-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 var(--dark);
}

.answer-btn.correct {
  background: var(--green) !important;
  color: white;
  animation: correctPop 0.5s ease;
}

.answer-btn.wrong {
  background: var(--red) !important;
  color: white;
  animation: wrongShake 0.5s ease;
}

@keyframes correctPop {
  0%, 100% { transform: scale(1); }
  40% { transform: scale(1.12) rotate(-2deg); }
  70% { transform: scale(1.05) rotate(2deg); }
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-10px); }
  30% { transform: translateX(10px); }
  45% { transform: translateX(-8px); }
  60% { transform: translateX(8px); }
  75% { transform: translateX(-4px); }
}

.float-feedback {
  position: fixed;
  font-size: 1.8rem;
  font-weight: 700;
  pointer-events: none;
  animation: floatUp 1.1s ease-out forwards;
  z-index: 100;
  text-shadow: 2px 2px 0 var(--dark);
  white-space: nowrap;
}

@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
  20% { opacity: 1; transform: translate(-50%, -20px) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -110px) scale(1); }
}

.combo-banner {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--yellow);
  color: var(--dark);
  font-size: 2.2rem;
  font-weight: 700;
  padding: 16px 32px;
  border-radius: 25px;
  border: 5px solid var(--dark);
  box-shadow: 0 8px 0 var(--dark), 0 14px 30px rgba(0,0,0,0.3);
  z-index: 200;
  pointer-events: none;
  animation: comboShow 1.1s ease forwards;
  letter-spacing: 2px;
}

@keyframes comboShow {
  0% { transform: translate(-50%, -50%) scale(0) rotate(-20deg); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.15) rotate(5deg); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); opacity: 1; }
  85% { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
  100% { transform: translate(-50%, -80%) scale(0.8); opacity: 0; }
}

/* ========== END SCREEN ========== */
.end-emoji {
  font-size: 5rem;
  animation: endBounce 1s ease infinite;
}

@keyframes endBounce {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50% { transform: translateY(-12px) rotate(5deg); }
}

.end-title {
  font-size: 2rem;
  font-weight: 700;
  color: white;
  text-shadow: 3px 3px 0 var(--dark);
}

.score-display {
  background: white;
  border-radius: 26px;
  padding: 24px 50px;
  border: 5px solid var(--dark);
  box-shadow: 0 7px 0 var(--dark), 0 14px 30px rgba(0,0,0,0.25);
}

.score-display .stat-label {
  font-size: 0.95rem;
  letter-spacing: 1.5px;
}

.score-display .stat-value {
  font-size: 4.5rem;
  color: var(--pink);
  font-weight: 700;
}

.new-record {
  background: var(--yellow);
  color: var(--dark);
  font-weight: 700;
  font-size: 1.2rem;
  padding: 12px 24px;
  border-radius: 18px;
  border: 4px solid var(--dark);
  box-shadow: 0 5px 0 var(--dark);
  display: none;
  animation: recordWiggle 0.8s ease infinite;
  letter-spacing: 1px;
}

.new-record.show { display: block; }

@keyframes recordWiggle {
  0%, 100% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
}

.btn-row {
  display: flex;
  gap: 10px;
  width: 100%;
}

.action-btn {
  flex: 1;
  background: white;
  border: 4px solid var(--dark);
  border-radius: 18px;
  padding: 16px;
  font-family: inherit;
  font-size: 1.15rem;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 6px 0 var(--dark);
  transition: all 0.12s ease;
  color: var(--dark);
}

.action-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 var(--dark);
}

.action-btn.primary {
  background: var(--green);
  color: white;
}

.share-btn {
  width: 100%;
  background: var(--blue);
  color: white;
  border: 4px solid var(--dark);
  border-radius: 18px;
  padding: 16px;
  font-family: inherit;
  font-size: 1.2rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 6px 0 var(--dark);
  transition: all 0.12s ease;
  letter-spacing: 1px;
}

.share-btn:active {
  transform: translateY(4px);
  box-shadow: 0 2px 0 var(--dark);
}

.share-btn:disabled {
  opacity: 0.6;
  cursor: wait;
}

.confetti {
  position: fixed;
  top: -20px;
  z-index: 9999;
  animation: confettiFall linear forwards;
  pointer-events: none;
}

@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.top-controls {
  position: fixed;
  top: max(15px, env(safe-area-inset-top));
  right: 15px;
  display: flex;
  gap: 8px;
  z-index: 60;
}

.icon-btn {
  background: white;
  border: 3px solid var(--dark);
  border-radius: 50%;
  width: 42px;
  height: 42px;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: 0 4px 0 var(--dark);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.12s ease;
}

.icon-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--dark);
}

@media (min-width: 600px) {
  .question { font-size: 4.5rem; }
  .answer-btn { font-size: 2rem; padding: 22px; }
}

@media (max-height: 640px) {
  .container { padding: 14px; gap: 12px; }
  .screen { gap: 14px; }
  .title { font-size: 2.2rem; }
  .question-card { padding: 24px 20px; }
  .question { font-size: 2.6rem; }
  .answer-btn { padding: 15px; font-size: 1.6rem; }
  .record-card { padding: 12px 24px; }
  .record-value { font-size: 2rem; }
  .start-btn { padding: 14px 40px; font-size: 1.4rem; }
}
</style>
</head>
<body>
<div class="bg-shape"></div>
<div class="bg-shape"></div>

<div class="top-controls">
  <button class="icon-btn" id="soundToggle" aria-label="Suoni">🔊</button>
</div>

<div class="container">
  <div class="screen active" id="startScreen">
    <h1 class="title">TABELLINE<br><span class="row2">SPRINT!</span></h1>
    <div class="record-card">
      <div class="record-icon">🏆</div>
      <div class="record-text">
        <div class="record-label">Record</div>
        <div class="record-value" id="recordValue">0</div>
        <div class="record-context" id="recordContext">Tutte le tabelline</div>
      </div>
    </div>
    <div class="tables-selector">
      <div class="tables-label">✨ Scegli le tabelline</div>
      <div class="tables-grid" id="tablesGrid"></div>
    </div>
    <button class="start-btn" id="startBtn">GIOCA!</button>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-header">
      <div class="stat-box">
        <div class="stat-label">⏱ Tempo</div>
        <div class="stat-value timer-value" id="timerValue">60</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">⭐ Punti</div>
        <div class="stat-value" id="scoreValue">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">🔥 Serie</div>
        <div class="stat-value" id="streakValue">0</div>
      </div>
    </div>
    <div class="timer-bar-container">
      <div class="timer-bar" id="timerBar"></div>
    </div>
    <div class="question-card" id="questionCard">
      <div class="question" id="questionText">7 <span class="op">×</span> 8 <span class="q-mark">=</span></div>
    </div>
    <div class="answers" id="answers"></div>
  </div>

  <div class="screen" id="endScreen">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <h2 class="end-title" id="endTitle">Tempo scaduto!</h2>
    <div class="new-record" id="newRecord">🏆 NUOVO RECORD! 🏆</div>
    <div class="score-display">
      <div class="stat-label">Punteggio</div>
      <div class="stat-value" id="finalScore">0</div>
    </div>
    <button class="share-btn" id="shareBtn">📤 Condividi punteggio</button>
    <div class="btn-row">
      <button class="action-btn" id="menuBtn">🏠 Menu</button>
      <button class="action-btn primary" id="playAgainBtn">🚀 Ancora!</button>
    </div>
  </div>
</div>

<script>
// ============ STATE ============
const state = {
  selectedTables: [2,3,4,5,6,7,8,9,10],
  records: {},
  score: 0,
  streak: 0,
  maxStreak: 0,
  timeLeft: 60,
  currentAnswer: 0,
  timerInterval: null,
  gameTime: 60,
  penalty: 3,
  soundOn: true,
  questionLocked: false,
  lastTickSecond: null,
  recentQuestions: [],
};

const APP_URL = (location.origin + location.pathname).replace(/\/index\.html$/, '/');

// ============ STORAGE (localStorage - works anywhere) ============
function storeGet(key) {
  try { return localStorage.getItem(key); }
  catch(e) { return null; }
}
function storeSet(key, value) {
  try { localStorage.setItem(key, String(value)); }
  catch(e) {}
}

function loadState() {
  const t = storeGet('tabelline_selectedTables');
  if (t) {
    try {
      const arr = JSON.parse(t);
      if (Array.isArray(arr) && arr.length > 0) state.selectedTables = arr;
    } catch(e) {}
  }
  const s = storeGet('tabelline_soundOn');
  if (s !== null) state.soundOn = s === 'true';

  const r = storeGet('tabelline_records');
  if (r) {
    try {
      const obj = JSON.parse(r);
      if (obj && typeof obj === 'object') state.records = obj;
    } catch(e) {}
  } else {
    const oldBest = storeGet('tabelline_bestScore');
    if (oldBest) {
      const v = parseInt(oldBest, 10);
      if (v > 0) {
        state.records[recordKey([2,3,4,5,6,7,8,9,10])] = v;
        storeSet('tabelline_records', JSON.stringify(state.records));
      }
    }
  }
}

// ============ RECORDS ============
function recordKey(tables) {
  return [...tables].sort((a, b) => a - b).join(',');
}

function getCurrentRecord() {
  return state.records[recordKey(state.selectedTables)] || 0;
}

function recordLabel(tables) {
  const sorted = [...tables].sort((a, b) => a - b);
  const allDefault = sorted.length === 9 && sorted.every((t, i) => t === i + 2);
  if (allDefault) return 'Tutte le tabelline';
  if (sorted.length === 1) return `Tabellina del ${sorted[0]}`;
  return 'Tabelline: ' + sorted.join(', ');
}

function updateRecordDisplay() {
  document.getElementById('recordValue').textContent = getCurrentRecord();
  document.getElementById('recordContext').textContent = recordLabel(state.selectedTables);
}

// ============ AUDIO ============
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
  return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.18) {
  if (!state.soundOn) return;
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur + 0.05);
  } catch(e) {}
}

// ============ CONFETTI ============
function createConfetti(count = 50) {
  const colors = ['#ff3d8a', '#ffc845', '#3aa3ff', '#8b5cf6', '#34d399', '#ff8c42'];
  for (let i = 0; i < count; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
    c.style.animationDelay = Math.random() * 0.4 + 's';
    const size = 8 + Math.random() * 10;
    c.style.width = size + 'px';
    c.style.height = size + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

function floatFeedback(text, color, x, y) {
  const f = document.createElement('div');
  f.className = 'float-feedback';
  f.textContent = text;
  f.style.color = color;
  f.style.left = x + 'px';
  f.style.top = y + 'px';
  document.body.appendChild(f);

function showComboBanner(text) {

// ============ QUESTION GENERATION ============
function newQuestion() {
  const tables = state.selectedTables.length > 0 ? state.selectedTables : [2,3,4,5,6,7,8,9,10];
  let a, b, key, attempts = 0;
  do {
    a = tables[Math.floor(Math.random() * tables.length)];
    b = Math.floor(Math.random() * 9) + 2;
    key = a + 'x' + b;
    attempts++;
  } while (state.recentQuestions.includes(key) && attempts < 15);
  state.recentQuestions.push(key);
  if (state.recentQuestions.length > 4) state.recentQuestions.shift();

  const correct = a * b;
  state.currentAnswer = correct;

  const distractors = new Set();
  const closeOffsets = [1, 2, 3, 4, 5, 6, 7, 8];
  const shuffled = closeOffsets.sort(() => Math.random() - 0.5);
  for (const off of shuffled) {
    if (distractors.size >= 2) break;
    const sign = Math.random() < 0.5 ? -1 : 1;
    const cand = correct + sign * off;
    if (cand > 0 && cand !== correct) distractors.add(cand);
    if (distractors.size < 2) {
      const cand2 = correct - sign * off;
      if (cand2 > 0 && cand2 !== correct && !distractors.has(cand2)) distractors.add(cand2);
    }
  }
  while (distractors.size < 2) {
    const cand = correct + Math.floor(Math.random() * 20) - 10;
    if (cand > 0 && cand !== correct) distractors.add(cand);
  }

  const answers = [correct, ...distractors];
  for (let i = answers.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [answers[i], answers[j]] = [answers[j], answers[i]];
  }

  document.getElementById('questionText').innerHTML =
    `${a} <span class="op">×</span> ${b} <span class="q-mark">=</span>`;

  const card = document.getElementById('questionCard');
  card.classList.remove('fly-in');
  void card.offsetWidth;
  card.classList.add('fly-in');

  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  answers.forEach(ans => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.textContent = ans;
    btn.addEventListener('click', () => handleAnswer(btn, ans));
    answersDiv.appendChild(btn);
  });
  state.questionLocked = false;
}

function handleAnswer(btn, ans) {
  if (state.questionLocked) return;
  state.questionLocked = true;
  const rect = btn.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  const y = rect.top + 10;

  if (ans === state.currentAnswer) {
    btn.classList.add('correct');
    state.score++;
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    const scoreEl = document.getElementById('scoreValue');
    const streakEl = document.getElementById('streakValue');
    scoreEl.textContent = state.score;
    streakEl.textContent = state.streak;
    scoreEl.classList.remove('bump'); void scoreEl.offsetWidth; scoreEl.classList.add('bump');
    streakEl.classList.remove('bump'); void streakEl.offsetWidth; streakEl.classList.add('bump');

    playCorrect();
    floatFeedback('+1 ⭐', '#34d399', x, y);

    if (state.streak > 0 && state.streak % 5 === 0) {
      createConfetti(35);
      showComboBanner(`COMBO x${state.streak}! 🔥`);
      playCombo();
    }
    setTimeout(() => newQuestion(), 380);
  } else {
    btn.classList.add('wrong');
    state.streak = 0;
    document.getElementById('streakValue').textContent = 0;
    state.timeLeft = Math.max(0.5, state.timeLeft - state.penalty);
    playWrong();
    floatFeedback(`-${state.penalty}s ⏱`, '#ef4444', x, y);
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (parseInt(b.textContent, 10) === state.currentAnswer) {
        b.classList.add('correct');
      }
    });
    if (navigator.vibrate) {
      try { navigator.vibrate([60, 40, 80]); } catch(e) {}
    }
    setTimeout(() => newQuestion(), 750);
  }
}

// ============ TIMER ============
function startTimer() {
  state.timeLeft = state.gameTime;
  state.lastTickSecond = null;
  let lastTick = performance.now();
  state.timerInterval = setInterval(() => {
    const now = performance.now();
    const dt = (now - lastTick) / 1000;
    lastTick = now;
    state.timeLeft = Math.max(0, state.timeLeft - dt);
    updateTimerUI();
    if (state.timeLeft <= 0) endGame();
  }, 90);
}

function updateTimerUI() {
  const t = Math.ceil(state.timeLeft);
  document.getElementById('timerValue').textContent = t;
  const pct = (state.timeLeft / state.gameTime) * 100;
  document.getElementById('timerBar').style.width = pct + '%';
  const timerEl = document.getElementById('timerValue');
  if (t <= 5 && t > 0) {
    timerEl.classList.add('warning');
    if (state.lastTickSecond !== t) {
      state.lastTickSecond = t;
      playTick();
    }
  } else {
    timerEl.classList.remove('warning');
  }
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  state.score = 0;
  state.streak = 0;
  state.maxStreak = 0;
  state.timeLeft = state.gameTime;
  state.recentQuestions = [];
  document.getElementById('scoreValue').textContent = 0;
  document.getElementById('streakValue').textContent = 0;
  document.getElementById('timerValue').textContent = state.gameTime;
  document.getElementById('timerBar').style.width = '100%';
  document.getElementById('timerValue').classList.remove('warning');
  getAudioCtx();
  showScreen('gameScreen');
  newQuestion();
  startTimer();
}

function endGame() {
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  document.getElementById('finalScore').textContent = state.score;
  const newRec = document.getElementById('newRecord');
  const endTitle = document.getElementById('endTitle');

  const key = recordKey(state.selectedTables);
  const previousRecord = state.records[key] || 0;
  if (state.score > previousRecord && state.score > 0) {
    state.records[key] = state.score;
    storeSet('tabelline_records', JSON.stringify(state.records));
    updateRecordDisplay();
    newRec.classList.add('show');
    document.getElementById('endEmoji').textContent = '🏆';
    endTitle.textContent = 'Fantastico!';
    createConfetti(90);
    playNewRecord();
  } else {
    newRec.classList.remove('show');
    let emoji = '💪', title = 'Tempo scaduto!';
    if (state.score >= 25) { emoji = '🌟'; title = 'Sei un campione!'; }
    else if (state.score >= 15) { emoji = '🎉'; title = 'Bravo!'; }
    else if (state.score >= 8) { emoji = '😊'; title = 'Bel lavoro!'; }
    else { emoji = '💪'; title = 'Riprova!'; }
    document.getElementById('endEmoji').textContent = emoji;
    endTitle.textContent = title;
    playGameOver();
  }
  showScreen('endScreen');
}

// ============ SHARE ============
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

async function generateShareImage(score, tables, isNewRecord) {
  try { await document.fonts.ready; } catch(e) {}

  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1080;
  const ctx = canvas.getContext('2d');

  const grad = ctx.createLinearGradient(0, 0, 1080, 1080);
  grad.addColorStop(0, '#ff3d8a');
  grad.addColorStop(0.5, '#8b5cf6');
  grad.addColorStop(1, '#3aa3ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 1080, 1080);

  ctx.fillStyle = 'rgba(255, 200, 69, 0.35)';
  ctx.beginPath(); ctx.arc(120, 120, 180, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(52, 211, 153, 0.3)';
  ctx.beginPath(); ctx.arc(960, 960, 220, 0, Math.PI * 2); ctx.fill();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 96px Fredoka, system-ui, sans-serif';
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText('TABELLINE', 540 + 6, 130 + 6);
  ctx.fillStyle = '#fff';
  ctx.fillText('TABELLINE', 540, 130);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillText('SPRINT!', 540 + 6, 235 + 6);
  ctx.fillStyle = '#ffc845';
  ctx.fillText('SPRINT!', 540, 235);

  const boxX = 110, boxY = 340, boxW = 860, boxH = 420;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 14;
  roundRect(ctx, boxX, boxY, boxW, boxH, 44);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#888';
  ctx.font = '500 40px Fredoka, system-ui, sans-serif';
  ctx.fillText('PUNTEGGIO', 540, boxY + 75);

  ctx.fillStyle = '#ff3d8a';
  ctx.font = 'bold 260px Fredoka, system-ui, sans-serif';
  ctx.fillText(String(score), 540, boxY + 240);

  if (isNewRecord) {
    const badgeX = 230, badgeY = boxY + 350, badgeW = 620, badgeH = 70;
    ctx.fillStyle = '#ffc845';
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 8;
    roundRect(ctx, badgeX, badgeY, badgeW, badgeH, 35);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#1a1a2e';
    ctx.font = 'bold 34px Fredoka, system-ui, sans-serif';
    ctx.fillText('🏆 NUOVO RECORD! 🏆', 540, badgeY + badgeH / 2);
  }

  const tablesText = recordLabel(tables);
  ctx.fillStyle = '#fff';
  ctx.font = '600 42px Fredoka, system-ui, sans-serif';
  wrapText(ctx, tablesText, 540, 820, 980, 50);

  ctx.fillStyle = '#fff';
  ctx.font = '500 38px Fredoka, system-ui, sans-serif';
  ctx.fillText('Riesci a battermi?', 540, 920);

  ctx.fillStyle = '#ffc845';
  ctx.font = 'bold 36px Fredoka, system-ui, sans-serif';
  const displayUrl = APP_URL.replace(/^https?:\/\//, '').replace(/\/$/, '');
  ctx.fillText(displayUrl, 540, 1000);

  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  const startY = y - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach((l, i) => ctx.fillText(l, x, startY + i * lineHeight));
}

async function shareScore() {
  const btn = document.getElementById('shareBtn');
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⏳ Preparo l\'immagine...';

  const score = state.score;
  const tables = [...state.selectedTables];
  const isNewRecord = document.getElementById('newRecord').classList.contains('show');
  const tablesText = recordLabel(tables).toLowerCase();
  const text = isNewRecord
    ? `🏆 Nuovo record su Tabelline Sprint: ${score} punti (${tablesText})! Riesci a battermi?`
    : `Ho fatto ${score} punti su Tabelline Sprint (${tablesText})! Riesci a battermi?`;

  try {
    const blob = await generateShareImage(score, tables, isNewRecord);
    if (!blob) throw new Error('blob nullo');
    const file = new File([blob], 'tabelline-sprint.png', { type: 'image/png' });

    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text, url: APP_URL, title: 'Tabelline Sprint' });
    } else {
      const dlUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = dlUrl;
      a.download = 'tabelline-sprint.png';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(dlUrl), 1000);
      let copied = false;
      try { await navigator.clipboard.writeText(text + ' ' + APP_URL); copied = true; } catch(e) {}
      alert(copied
        ? 'Immagine scaricata e testo copiato negli appunti!'
        : 'Immagine scaricata. Puoi condividerla con il testo:\n\n' + text + ' ' + APP_URL);
    }
  } catch(e) {
    if (e && e.name !== 'AbortError') {
      console.error('Share failed:', e);
      alert('Impossibile condividere. Riprova.');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

function buildTablesGrid() {
  const grid = document.getElementById('tablesGrid');
  grid.innerHTML = '';
  for (let i = 2; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'table-toggle' + (state.selectedTables.includes(i) ? ' active' : '');
    btn.textContent = i;
    btn.addEventListener('click', () => {
      const idx = state.selectedTables.indexOf(i);
      if (idx >= 0) {
        if (state.selectedTables.length > 1) {
          state.selectedTables.splice(idx, 1);
          btn.classList.remove('active');
        }
      } else {
        state.selectedTables.push(i);
        btn.classList.add('active');
      }
      storeSet('tabelline_selectedTables', JSON.stringify(state.selectedTables));
      updateRecordDisplay();
      if (state.soundOn) playTone(660, 0.04, 'triangle', 0.1);
    });
    grid.appendChild(btn);
  }
}

function init() {
  loadState();
  updateRecordDisplay();
  document.getElementById('soundToggle').textContent = state.soundOn ? '🔊' : '🔇';
  buildTablesGrid();

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('playAgainBtn').addEventListener('click', startGame);
  document.getElementById('menuBtn').addEventListener('click', () => showScreen('startScreen'));
  document.getElementById('shareBtn').addEventListener('click', shareScore);
  document.getElementById('soundToggle').addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    document.getElementById('soundToggle').textContent = state.soundOn ? '🔊' : '🔇';
    storeSet('tabelline_soundOn', state.soundOn);
    if (state.soundOn) playTone(660, 0.08, 'triangle', 0.15);
  });

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => {
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive: false });
}

init();
